name: Deploy Theme

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy/korn-und-hansemarkt-theme
          cp functions.php index.php style.css deploy/korn-und-hansemarkt-theme/
          cp screenshot.png deploy/korn-und-hansemarkt-theme/ 2>/dev/null || true
          cp -r dist deploy/korn-und-hansemarkt-theme/

      - name: Deploy to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: deploy/korn-und-hansemarkt-theme/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_port: ${{ secrets.DEPLOY_PORT || 22 }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}
