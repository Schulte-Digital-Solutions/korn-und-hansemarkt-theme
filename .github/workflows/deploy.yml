name: Deploy Theme

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy/korn-und-hansemarkt-theme
          cp functions.php index.php style.css deploy/korn-und-hansemarkt-theme/
          cp screenshot.png deploy/korn-und-hansemarkt-theme/ 2>/dev/null || true
          cp -r inc deploy/korn-und-hansemarkt-theme/
          cp -r dist deploy/korn-und-hansemarkt-theme/

      - name: Deploy to server
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.DEPLOY_PASSWORD }}" rsync -avz --delete \
            -e "ssh -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=no" \
            deploy/korn-und-hansemarkt-theme/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}
